<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X Post Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="panel">

            <h1>X Post Generator</h1>
            <p>Generate clean X-style posts for LinkedIn</p>

            <div class="toggle">
                <button class="tab active" data-mode="single">Single</button>
                <button class="tab" data-mode="bulk">Bulk</button>
            </div>

            <!-- SINGLE MODE -->
            <div id="singleMode">

                <input type="file" id="avatarInput">

                <input id="nameInput" placeholder="Name" value="Ariana Hernandez">

                <input id="usernameInput" placeholder="Username" value="@ArianaHernandez">

                <textarea id="postInput">Most businesses don't lose customers because they're expensive.

They lose customers because they're inconsistent.

Consistency is a competitive advantage.</textarea>

                <button id="downloadBtn">Download PNG</button>

            </div>

            <!-- BULK MODE -->
            <div id="bulkMode" class="hidden">

                <textarea id="bulkInput" placeholder="Paste posts separated by ---"></textarea>

                <button id="bulkGenerateBtn">Generate All</button>

            </div>

        </div>

    </aside>

    <!-- PREVIEW -->
    <main class="preview">

        <div id="card">

            <div class="header">

                <img id="avatarPreview" src="assets/default-avatar.png">

                <div class="user">

                    <div class="nameRow">
                        <span id="namePreview">Ariana Hernandez</span>
                        <img class="verified" src="assets/verified.svg">
                    </div>

                    <div id="usernamePreview">@ArianaHernandez</div>

                </div>

                <img class="xLogo" src="assets/x-logo.svg">

            </div>

            <div id="postPreview"></div>

        </div>

    </main>

</div>

<script src="libs/html2canvas.min.js"></script>
<script src="script.js"></script>

</body>
</html>
